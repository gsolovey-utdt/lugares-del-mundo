<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review · Lugares del Mundo</title>
  <style>
    :root { color-scheme: light; }
    body { font-family: system-ui, sans-serif; margin: 0; background: #f4f6f8; color: #1a2733; }
    header {
      position: sticky; top: 0; z-index: 10; background: #1a6a9f; color: #fff;
      padding: 12px 18px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    header h1 { font-size: 18px; margin: 0; }
    header .count { font-weight: 700; }
    header button {
      font: inherit; font-weight: 700; cursor: pointer; border: 0; border-radius: 8px;
      padding: 8px 14px; background: #ff8c42; color: #1a1a1a;
    }
    header button.secondary { background: #ffffff33; color: #fff; }
    main { padding: 18px; }
    .place { margin-bottom: 26px; }
    .place h2 { font-size: 16px; margin: 0 0 8px; }
    .place h2 .country { color: #5b7187; font-weight: 400; }
    .place h2 .pending { color: #c0392b; font-weight: 700; }
    .place h2 .picked { color: #1e8449; font-weight: 700; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
    .cand {
      position: relative; border: 4px solid transparent; border-radius: 12px; overflow: hidden;
      cursor: pointer; background: #fff; aspect-ratio: 960 / 660;
    }
    .cand img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .cand.selected { border-color: #1e8449; }
    .cand .tag {
      position: absolute; top: 6px; left: 6px; background: #1e8449; color: #fff;
      font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 999px; display: none;
    }
    .cand.selected .tag { display: block; }
    .cand .author {
      position: absolute; bottom: 0; left: 0; right: 0; font-size: 11px; color: #fff;
      background: linear-gradient(transparent, rgba(0,0,0,.7)); padding: 14px 6px 4px;
    }
    .note { color: #5b7187; font-size: 13px; }
    .empty { padding: 40px; text-align: center; color: #5b7187; }
  </style>
</head>
<body>
  <header>
    <h1>Curación de imágenes</h1>
    <span class="count"><span id="done">0</span> / <span id="total">0</span> elegidas</span>
    <button id="download">⬇ Descargar selections.json</button>
    <button id="reset" class="secondary">Reiniciar selección</button>
    <span class="note">Clic en una foto para elegirla. Se guarda en este navegador; al terminar, descargá el JSON a <code>scripts/</code>.</span>
  </header>
  <main id="main"><div class="empty">Cargando candidatos…</div></main>

  <script>
    const LS_KEY = "ldm_selections";
    const INDEX_URL = "../images/_candidates/_index.json";
    let selections = {};
    try { selections = JSON.parse(localStorage.getItem(LS_KEY) || "{}"); } catch (_) {}

    const $ = (id) => document.getElementById(id);

    function save() {
      localStorage.setItem(LS_KEY, JSON.stringify(selections));
      updateCount();
    }
    function updateCount() {
      $("done").textContent = Object.keys(selections).length;
    }

    async function load() {
      let index;
      try {
        const resp = await fetch(INDEX_URL, { cache: "no-store" });
        if (!resp.ok) throw new Error("HTTP " + resp.status);
        index = await resp.json();
      } catch (err) {
        $("main").innerHTML =
          '<div class="empty">No pude cargar <code>' + INDEX_URL + '</code>.<br>' +
          'Corré primero <code>python scripts/fetch_images.py</code> y abrí esta página ' +
          'servida por <code>python -m http.server</code> (no como archivo file://).<br><br>' +
          '<small>' + err + '</small></div>';
        return;
      }

      $("total").textContent = index.length;
      updateCount();
      const main = $("main");
      main.innerHTML = "";

      for (const place of index) {
        const section = document.createElement("section");
        section.className = "place";
        section.id = "place-" + place.slug;

        const h2 = document.createElement("h2");
        h2.innerHTML =
          place.place_name + ' <span class="country">· ' + (place.country || "") + "</span> " +
          '<span class="status"></span>';
        section.appendChild(h2);

        const grid = document.createElement("div");
        grid.className = "grid";

        // intentamos leer autores del candidates.json del lugar
        let meta = [];
        try {
          const mr = await fetch("../images/_candidates/" + place.slug + "/candidates.json", { cache: "no-store" });
          if (mr.ok) meta = await mr.json();
        } catch (_) {}
        const authorOf = (f) => (meta.find((m) => m.file === f) || {}).photographer || "";

        for (const file of place.candidates) {
          const card = document.createElement("div");
          card.className = "cand";
          card.dataset.slug = place.slug;
          card.dataset.file = file;
          card.innerHTML =
            '<img loading="lazy" src="../images/_candidates/' + place.slug + "/" + file + '" alt="">' +
            '<span class="tag">elegida ✓</span>' +
            '<span class="author">' + authorOf(file) + "</span>";
          card.addEventListener("click", () => {
            selections[place.slug] = file;
            save();
            paint(section, place.slug);
          });
          grid.appendChild(card);
        }
        section.appendChild(grid);
        main.appendChild(section);
        paint(section, place.slug);
      }
    }

    function paint(section, slug) {
      const chosen = selections[slug];
      section.querySelectorAll(".cand").forEach((c) => {
        c.classList.toggle("selected", c.dataset.file === chosen);
      });
      const status = section.querySelector(".status");
      status.innerHTML = chosen
        ? '<span class="picked">✓ elegida</span>'
        : '<span class="pending">· falta elegir</span>';
    }

    $("download").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(selections, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "selections.json";
      a.click();
      URL.revokeObjectURL(a.href);
    });

    $("reset").addEventListener("click", () => {
      if (confirm("¿Borrar todas las selecciones de este navegador?")) {
        selections = {};
        save();
        document.querySelectorAll(".place").forEach((s) => paint(s, s.id.replace("place-", "")));
      }
    });

    load();
  </script>
</body>
</html>
