name: Supabase keep-alive

# Evita la pausa automatica del plan gratuito de Supabase (7 dias sin actividad).
# Cada corrida hace dos cosas:
#   1. Toca un archivo .github/keepalive.txt y lo commitea. Esto mantiene el
#      repo "activo" para GitHub, que de lo contrario deshabilita los cron de
#      Actions despues de 60 dias sin commits.
#   2. Hace un GET autenticado contra la API REST de Supabase. Eso resetea el
#      contador de inactividad del proyecto.
#
# Tambien se puede disparar a mano desde la pestana Actions.

on:
  schedule:
    - cron: "0 12 */3 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Touch keepalive file
        run: |
          mkdir -p .github
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/keepalive.txt
          echo "Last keep-alive run." >> .github/keepalive.txt

      - name: Commit timestamp
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive.txt
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: keep-alive ping [skip ci]"
            git push
          fi

      - name: Ping Supabase REST
        env:
          SUPABASE_URL: https://irryksaoygdklwtsjsru.supabase.co
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "ERROR: Secret SUPABASE_ANON_KEY no esta configurado." >&2
            echo "Settings -> Secrets and variables -> Actions -> New repository secret" >&2
            exit 1
          fi
          status=$(curl -s -o /tmp/body -w "%{http_code}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/ldm_sessions?select=session_id&limit=1")
          echo "HTTP $status"
          cat /tmp/body
          if [ "$status" != "200" ] && [ "$status" != "206" ]; then
            echo "ERROR: respuesta inesperada del endpoint." >&2
            exit 1
          fi
